name: Test and deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,data]"
      - run: python -m wifi_datahub catalog validate
      - run: python -m unittest discover -s tests
      - run: python examples/make_synthetic_input.py
      - run: python -m wifi_datahub standardize --input examples/data/synthetic_csi.csv --output examples/data/standardized/synthetic_csi.npz --dataset-id synthetic-demo --sample-rate 100 --duration 4
      - run: python -m wifi_datahub quality --input examples/data/standardized/synthetic_csi.npz --output site/data/example-quality.json
      - run: python scripts/build_site_data.py
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
